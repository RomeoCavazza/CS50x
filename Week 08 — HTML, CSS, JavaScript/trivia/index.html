<!DOCTYPE html>

<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <title>Trivia!</title>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let mcButtons = document.querySelectorAll('.mc-btn');
            mcButtons.forEach(button => {
                button.addEventListener('click', function () {
                    let feedback = button.parentElement.querySelector('.mc-feedback');
                    if (button.dataset.correct === "true") {
                        button.style.backgroundColor = 'green';
                        feedback.innerHTML = 'Correct!';
                    } else {
                        button.style.backgroundColor = 'red';
                        feedback.innerHTML = 'Incorrect!';
                    }
                });
            });

            let frSubmit = document.querySelector('#fr-submit');
            frSubmit.addEventListener('click', function () {
                let input = document.querySelector('#fr-input');
                let feedback = document.querySelector('.fr-feedback');
                if (input.value.trim().toLowerCase() === 'mars') {
                    input.style.backgroundColor = 'green';
                    feedback.innerHTML = 'Correct!';
                } else {
                    input.style.backgroundColor = 'red';
                    feedback.innerHTML = 'Incorrect!';
                }
            });
        });
    </script>
</head>

<body>
    <div class="header">
        <h1>Trivia!</h1>
    </div>

    <div class="container">
        <div class="section">
            <h2>Part 1: Multiple Choice </h2>
            <hr>
            <h3>What is the name of the CS50 rubber duck?</h3>
            <button class="mc-btn" data-correct="false">Quack</button>
            <button class="mc-btn" data-correct="false">Duckie</button>
            <button class="mc-btn" data-correct="true">CS50 Duck</button>
            <button class="mc-btn" data-correct="false">Mr. Duck</button>
            <p class="mc-feedback"></p>
        </div>

        <div class="section">
            <h2>Part 2: Free Response</h2>
            <hr>
            <h3>Which planet is known as the "Red Planet"?</h3>
            <input id="fr-input" type="text" placeholder="Your answer...">
            <button id="fr-submit">Check Answer</button>
            <p class="fr-feedback"></p>
        </div>
    </div>
</body>

</html>
