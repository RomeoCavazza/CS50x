<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <link href="styles.css" rel="stylesheet">
    <title>Contact | Roméo Cavazza</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="index.html">Romeo</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="hobbies.html">Hobbies</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item active"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item">
                        <button id="theme-toggle"
                            class="btn btn-sm btn-outline-primary ml-lg-3 mt-2 mt-lg-0">🌓</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 p-5 card">
                <h2 class="mb-4 font-weight-bold">Say <span class="text-primary">Hello</span></h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name" class="small font-weight-bold text-muted">NAME</label>
                        <input type="text" class="form-control border-0 bg-card shadow-none" id="name"
                            placeholder="Your Name" required style="border-radius: 0.5rem;">
                    </div>
                    <div class="form-group">
                        <label for="email" class="small font-weight-bold text-muted">EMAIL</label>
                        <input type="email" class="form-control border-0 bg-card shadow-none" id="email"
                            placeholder="email@example.com" required style="border-radius: 0.5rem;">
                    </div>
                    <div class="form-group">
                        <label for="message" class="small font-weight-bold text-muted">MESSAGE</label>
                        <textarea class="form-control border-0 bg-card shadow-none" id="message" rows="4"
                            placeholder="How can I help you?" style="border-radius: 0.5rem;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block py-3 font-weight-bold shadow-sm mt-3">SEND
                        MESSAGE</button>
                </form>
                <div id="form-feedback" class="mt-4 p-3 bg-success text-white rounded shadow-sm text-center"
                    style="display:none;">
                    <i class='bx bx-check-circle mr-2'></i> Message sent successfully!
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center">
        <div class="container">
            <span class="text-muted">© 2026 Roméo Cavazza — Availability: Paris / Remote</span>
        </div>
    </footer>

    <!-- Bootstrap & Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
