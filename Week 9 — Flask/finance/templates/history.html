{% extends "layout.html" %}

{% block title %}
History
{% endblock %}

{% block main %}
<table class="table table-striped">
    <thead>
        <tr>
            <th class="text-start">Symbol</th>
            <th class="text-start">Shares</th>
            <th class="text-start">Price</th>
            <th class="text-start">Transacted</th>
        </tr>
    </thead>
    <tbody>
        {% for transaction in transactions %}
        <tr>
            <td class="text-start">{{ transaction.symbol }}</td>
            <td class="text-start">{{ transaction.shares }}</td>
            <td class="text-start">{{ transaction.price | usd }}</td>
            <td class="text-start">{{ transaction.timestamp }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
